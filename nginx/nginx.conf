upstream api {
    server api:3075;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Pass all API traffic to the Fastify server.
    # Connection: '' + keepalive above enables HTTP/1.1 keep-alives to the upstream.
    location / {
        proxy_pass         http://api;
        proxy_http_version 1.1;
        proxy_set_header   Connection '';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Stream delivery log searches without buffering the full body first.
        proxy_buffering    off;
        proxy_read_timeout 60s;
    }
}
